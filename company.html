<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company — IPO Labs</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: { brand: '#099d51' }
        }
      }
    }
  </script>

  <style>
    html { scroll-behavior: smooth; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 0.75s linear infinite; }
  </style>
</head>

<body class="bg-white font-sans text-black min-h-screen">

  <!-- =============================================
       HEADER / NAVIGATION
       ============================================= -->
  <header class="flex items-center justify-between px-4 sm:px-8 lg:px-[123px] h-[65px] border-b border-black/10">
    <a href="index.html" class="flex items-center gap-2.5">
      <img src="https://www.figma.com/api/mcp/asset/8baecbcf-18e5-4863-8384-8fe6316ab71b" alt="IPOlabs logo" class="w-[30px] h-[28px]">
      <span class="font-bold text-[16px] tracking-[-0.32px]">IPOlabs</span>
    </a>
    <nav class="hidden sm:flex gap-[30px] text-[14px] tracking-[-0.28px]">
      <a href="index.html#about"     class="hover:opacity-70">About</a>
      <a href="index.html#portfolio" class="hover:opacity-70">Portfolio</a>
      <a href="index.html#model"     class="hover:opacity-70">Model</a>
    </nav>
    <a href="index.html#cta" class="bg-brand text-white text-[14px] tracking-[-0.28px] px-3 py-[7px] rounded-[7px] hover:opacity-90">
      Work with us
    </a>
  </header>


  <!-- =============================================
       LOADING STATE
       ============================================= -->
  <div id="state-loading" class="flex flex-col items-center justify-center min-h-[60vh] gap-3">
    <div class="w-7 h-7 rounded-full border-2 border-black/10 border-t-brand animate-spin"></div>
    <p class="text-[13px] text-black/40 tracking-[-0.26px]">Loading…</p>
  </div>


  <!-- =============================================
       ERROR STATE
       ============================================= -->
  <div id="state-error" style="display:none" class="flex-col items-center justify-center min-h-[60vh] gap-4 px-4 text-center">
    <p class="text-[32px] font-medium tracking-[-0.64px]">Company not found</p>
    <p class="text-[15px] text-black/50 tracking-[-0.28px]">We couldn't find the company you're looking for.</p>
    <a href="index.html#portfolio" class="mt-2 bg-brand text-white text-[14px] tracking-[-0.28px] px-4 py-2 rounded-[7px] hover:opacity-90">
      Back to Portfolio
    </a>
  </div>


  <!-- =============================================
       COMPANY PAGE
       ============================================= -->
  <div id="company-page" class="hidden">

    <!-- ── HERO ── -->
    <div class="max-w-[1141px] mx-auto px-4 pt-10 pb-12 md:pt-14 md:pb-16">

      <!-- Back link -->
      <a href="index.html#portfolio"
         class="inline-flex items-center gap-1.5 text-[13px] text-black/40 tracking-[-0.26px] hover:text-black transition-colors mb-10">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
        </svg>
        Back to Portfolio
      </a>

      <!-- 2-column: left content + right meta card -->
      <div class="flex flex-col md:flex-row gap-8 md:gap-12 items-start">

        <!-- LEFT: Logo, Name, Tagline, Status, Desc, Button -->
        <div class="flex-1 min-w-0">

          <!-- Logo + Name + Tagline -->
          <div class="flex items-start gap-4">
            <img id="hero-logo" src="" alt=""
                 class="w-[55px] h-[55px] rounded-[12px] object-cover border border-black/10 flex-shrink-0">
            <div class="min-w-0">
              <h1 id="hero-name"
                  class="text-[28px] md:text-[38px] font-semibold tracking-[-0.76px] leading-tight text-black"></h1>
              <p id="hero-tagline"
                 class="text-[14px] text-black/50 tracking-[-0.28px] mt-1 leading-snug"></p>
            </div>
          </div>

          <!-- Status badge -->
          <span id="hero-status"
                class="mt-4 inline-block text-[13px] font-medium tracking-[-0.26px]"></span>

          <!-- Brief description -->
          <p id="brief-desc"
             class="mt-5 text-[14px] text-black/60 leading-[24px] tracking-[-0.28px] max-w-[500px]"></p>

          <!-- Visit Website CTA -->
          <a id="hero-website" href="#" target="_blank" rel="noopener"
             class="hidden mt-7 inline-flex items-center gap-2 bg-brand text-white text-[14px] font-medium
                    tracking-[-0.28px] px-5 py-[10px] rounded-[8px] hover:opacity-90 transition-opacity">
            Visit Website
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M7 17L17 7"/><path d="M7 7h10v10"/>
            </svg>
          </a>
        </div>

        <!-- RIGHT: Meta card -->
        <div class="w-full md:w-[240px] flex-shrink-0">
          <div id="hero-meta"
               class="bg-[#fafafa] border border-black/10 rounded-2xl overflow-hidden divide-y divide-black/10">
            <!-- Populated by JS -->
          </div>
        </div>

      </div>
    </div><!-- /hero -->


    <!-- ── METRICS ── -->
    <div id="metrics-wrap" class="hidden border-t border-black/10">
      <div class="max-w-[1141px] mx-auto px-4 py-10 md:py-12">
        <div id="metrics-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4"></div>
      </div>
    </div>


    <!-- ── FULL DESCRIPTION 1 ── -->
    <div id="full-desc-1-wrap" class="hidden border-t border-black/10">
      <div class="max-w-[1141px] mx-auto px-4 py-12 md:py-16">
        <div id="full-desc-1" class="w-full"></div>
      </div>
    </div>


    <!-- ── GALLERY ── -->
    <div id="gallery-wrap" class="hidden border-t border-black/10">
      <div class="max-w-[1141px] mx-auto px-4 py-10 md:py-12">
        <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
      </div>
    </div>


    <!-- ── FULL DESCRIPTION 2 ── -->
    <div id="full-desc-2-wrap" class="hidden border-t border-black/10">
      <div class="max-w-[1141px] mx-auto px-4 py-12 md:py-16">
        <div id="full-desc-2" class="w-full"></div>
      </div>
    </div>


    <!-- ── BOTTOM CTA ── -->
    <div id="bottom-cta-wrap" class="hidden border-t border-black/10">
      <div class="max-w-[1141px] mx-auto px-4 py-10 md:py-12 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
        <div>
          <p id="bottom-cta-name" class="text-[18px] font-semibold tracking-[-0.36px]"></p>
          <p class="text-[13px] text-black/40 tracking-[-0.26px] mt-0.5">Ready to learn more?</p>
        </div>
        <a id="bottom-cta-link" href="#" target="_blank" rel="noopener"
           class="inline-flex items-center gap-2 bg-brand text-white text-[14px] font-medium
                  tracking-[-0.28px] px-5 py-[10px] rounded-[8px] hover:opacity-90 transition-opacity">
          Visit Website
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 17L17 7"/><path d="M7 7h10v10"/>
          </svg>
        </a>
      </div>
    </div>

  </div><!-- /company-page -->


  <!-- =============================================
       FOOTER
       ============================================= -->
  <footer class="max-w-[1138px] mx-auto mt-10 mb-[50px] px-4">
    <div class="bg-[#1a1a1a] rounded-[20px] py-8 px-6 md:py-[52px] md:px-[62px]">
      <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
        <div class="flex items-center gap-2.5">
          <img src="https://www.figma.com/api/mcp/asset/8baecbcf-18e5-4863-8384-8fe6316ab71b" alt="IPOlabs logo" class="w-[30px] h-[28px]">
          <span class="font-bold text-[16px] text-white tracking-[-0.32px]">IPOlabs</span>
        </div>
        <nav class="flex gap-[30px] text-[14px] text-white tracking-[-0.28px]">
          <a href="index.html#about"     class="hover:opacity-70">About</a>
          <a href="index.html#portfolio" class="hover:opacity-70">Portfolio</a>
          <a href="index.html#model"     class="hover:opacity-70">Model</a>
        </nav>
      </div>
      <hr class="border-white/20 my-[27px]">
      <p class="text-center text-[14px] text-white/40 tracking-[-0.28px]">&copy; 2026 IPO Labs. All rights reserved.</p>
    </div>
  </footer>


  <!-- =============================================
       SCRIPT
       ============================================= -->
  <script>
    (function () {
      var PROJECT_ID = '7a9s8ki1';
      var DATASET    = 'production';

      /* ── Helpers ── */
      function sanityImageUrl(source, opts) {
        if (!source || !source.asset || !source.asset._ref) return '';
        var match = source.asset._ref.match(/^image-(.+)-(\d+x\d+)-(\w+)$/);
        if (!match) return '';
        var url = 'https://cdn.sanity.io/images/' + PROJECT_ID + '/' + DATASET + '/' + match[1] + '-' + match[2] + '.' + match[3];
        if (opts) url += '?' + new URLSearchParams(opts).toString();
        return url;
      }

      function escapeHtml(str) {
        return String(str || '')
          .replace(/&/g, '&amp;').replace(/</g, '&lt;')
          .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function renderSpans(spans, markDefs) {
        if (!spans) return '';
        return spans.map(function (s) {
          if (s._type !== 'span') return '';
          var t = escapeHtml(s.text);
          (s.marks || []).forEach(function (mark) {
            if      (mark === 'strong')    t = '<strong class="font-semibold text-black">' + t + '</strong>';
            else if (mark === 'em')        t = '<em>' + t + '</em>';
            else if (mark === 'underline') t = '<u>' + t + '</u>';
            else if (mark === 'code')      t = '<code class="bg-black/5 px-1.5 py-0.5 rounded text-[13px] font-mono">' + t + '</code>';
            else {
              var def = (markDefs || []).find(function (d) { return d._key === mark; });
              if (def && def._type === 'link')
                t = '<a href="' + escapeHtml(def.href) + '" target="_blank" rel="noopener" class="text-brand underline underline-offset-2 hover:opacity-70">' + t + '</a>';
            }
          });
          return t;
        }).join('');
      }

      function renderBlocks(blocks) {
        if (!blocks || !blocks.length) return '';
        var html = '', listType = null, listItems = [];

        function flushList() {
          if (!listItems.length) return;
          var tag = listType === 'number' ? 'ol' : 'ul';
          var cls = 'list-' + (listType === 'number' ? 'decimal' : 'disc') +
            ' list-outside ml-6 space-y-2 mb-5 text-[15px] text-black/70 leading-[26px] tracking-[-0.28px]';
          html += '<' + tag + ' class="' + cls + '">' + listItems.join('') + '</' + tag + '>';
          listItems = []; listType = null;
        }

        blocks.forEach(function (block) {
          if (block._type !== 'block') return;
          if (block.listItem) {
            if (listType !== block.listItem) flushList();
            listType = block.listItem;
            listItems.push('<li>' + renderSpans(block.children, block.markDefs) + '</li>');
            return;
          }
          flushList();
          var content = renderSpans(block.children, block.markDefs);
          if (!content.trim()) return;
          switch (block.style) {
            case 'h2':
              html += '<h2 class="text-[24px] md:text-[32px] font-semibold tracking-[-0.64px] leading-tight text-black mt-10 mb-4">' + content + '</h2>'; break;
            case 'h3':
              html += '<h3 class="text-[20px] md:text-[24px] font-semibold tracking-[-0.48px] leading-tight text-black mt-8 mb-3">' + content + '</h3>'; break;
            case 'h4':
              html += '<h4 class="text-[17px] font-semibold tracking-[-0.34px] text-black mt-6 mb-2">' + content + '</h4>'; break;
            case 'blockquote':
              html += '<blockquote class="border-l-[3px] border-brand pl-5 my-6 text-[16px] italic text-black/50 leading-[28px]">' + content + '</blockquote>'; break;
            default:
              html += '<p class="text-[15px] text-black/70 leading-[26px] tracking-[-0.28px] mb-5">' + content + '</p>';
          }
        });
        flushList();
        return html;
      }

      function show(id) { document.getElementById(id).classList.remove('hidden'); }
      function hide(id) { document.getElementById(id).classList.add('hidden'); }
      function setText(id, v) { document.getElementById(id).textContent = v || ''; }
      function setHTML(id, v) { document.getElementById(id).innerHTML = v || ''; }

      /* ── Fetch ── */
      var slug = new URLSearchParams(window.location.search).get('slug');
      if (!slug) {
        hide('state-loading');
        document.getElementById('state-error').style.display = 'flex';
        return;
      }

      var query = encodeURIComponent(
        '*[_type == "project" && slug.current == $slug][0]{ _id, name, slug, logo, tagline, description, tags, websiteUrl, status, fullDescription1, "gallery": gallery[]{ asset, alt, caption }, fullDescription2, foundedYear, teamSize, location, metrics }'
      );
      var apiUrl = 'https://' + PROJECT_ID + '.api.sanity.io/v2021-10-21/data/query/' + DATASET
                 + '?query=' + query + '&%24slug=' + encodeURIComponent('"' + slug + '"');

      fetch(apiUrl)
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var c = data.result;
          if (!c) { hide('state-loading'); document.getElementById('state-error').style.display = 'flex'; return; }

          document.title = (c.name || 'Company') + ' — IPO Labs';

          /* Logo */
          var logoEl = document.getElementById('hero-logo');
          var logoUrl = sanityImageUrl(c.logo, { w: 180, h: 180, fit: 'crop' });
          if (logoUrl) { logoEl.src = logoUrl; logoEl.alt = escapeHtml(c.name) + ' logo'; }
          else logoEl.style.display = 'none';

          /* Name */
          setText('hero-name', c.name);

          /* Tagline */
          if (c.tagline) setText('hero-tagline', c.tagline);
          else document.getElementById('hero-tagline').style.display = 'none';

          /* Status badge */
          var statusEl = document.getElementById('hero-status');
          if (c.status) {
            statusEl.textContent = c.status;
            var colors = { Active: 'text-brand', Exited: 'text-black/40', Acquired: 'text-blue-600' };
            statusEl.className = 'mt-4 inline-block text-[13px] font-medium tracking-[-0.26px] ' + (colors[c.status] || 'text-black/50');
          }

          /* Brief description */
          if (c.description) setText('brief-desc', c.description);
          else document.getElementById('brief-desc').style.display = 'none';

          /* Visit Website button */
          if (c.websiteUrl) {
            var webBtn = document.getElementById('hero-website');
            webBtn.href = c.websiteUrl;
            webBtn.classList.remove('hidden');
          }

          /* Meta card rows */
          var metaRows = [];
          if (c.foundedYear) metaRows.push({ label: 'FOUNDED',   value: String(c.foundedYear) });
          if (c.teamSize)    metaRows.push({ label: 'TEAM SIZE',  value: c.teamSize });
          if (c.location)    metaRows.push({ label: 'LOCATION',   value: c.location });
          if (c.status)      metaRows.push({ label: 'STATUS',     value: c.status });
          document.getElementById('hero-meta').innerHTML = metaRows.map(function (r) {
            return '<div class="px-5 py-4">'
              + '<p class="text-[10px] font-medium tracking-[0.08em] text-black/35 uppercase mb-1">' + escapeHtml(r.label) + '</p>'
              + '<p class="text-[14px] font-medium text-black tracking-[-0.28px]">' + escapeHtml(r.value) + '</p>'
              + '</div>';
          }).join('');

          /* Metrics */
          if (c.metrics && c.metrics.length) {
            setHTML('metrics-grid', c.metrics.map(function (m) {
              return '<div class="bg-[#fafafa] border border-black/10 rounded-2xl px-6 py-5">'
                + '<p class="text-[32px] md:text-[40px] font-semibold tracking-[-0.8px] leading-none text-black">' + escapeHtml(m.value || '') + '</p>'
                + '<p class="text-[11px] font-medium tracking-[0.07em] uppercase text-black/40 mt-3">' + escapeHtml(m.label || '') + '</p>'
                + '</div>';
            }).join(''));
            show('metrics-wrap');
          }

          /* Full Description 1 */
          if (c.fullDescription1 && c.fullDescription1.length) {
            setHTML('full-desc-1', renderBlocks(c.fullDescription1));
            show('full-desc-1-wrap');
          }

          /* Gallery */
          if (c.gallery && c.gallery.length) {
            setHTML('gallery-grid', c.gallery.map(function (img) {
              var imgUrl = sanityImageUrl(img, { w: 900, fit: 'crop' });
              if (!imgUrl) return '';
              return '<figure class="overflow-hidden rounded-2xl border border-black/10">'
                + '<img src="' + imgUrl + '" alt="' + escapeHtml(img.alt || '') + '" class="w-full h-[240px] md:h-[320px] object-cover">'
                + (img.caption ? '<figcaption class="px-4 py-3 text-[12px] text-black/40 tracking-[-0.24px]">' + escapeHtml(img.caption) + '</figcaption>' : '')
                + '</figure>';
            }).join(''));
            show('gallery-wrap');
          }

          /* Full Description 2 */
          if (c.fullDescription2 && c.fullDescription2.length) {
            setHTML('full-desc-2', renderBlocks(c.fullDescription2));
            show('full-desc-2-wrap');
          }

          /* Bottom CTA */
          if (c.websiteUrl) {
            setText('bottom-cta-name', c.name);
            document.getElementById('bottom-cta-link').href = c.websiteUrl;
            show('bottom-cta-wrap');
          }

          hide('state-loading');
          show('company-page');
        })
        .catch(function () {
          hide('state-loading');
          document.getElementById('state-error').style.display = 'flex';
        });

    })();
  </script>

</body>
</html>
